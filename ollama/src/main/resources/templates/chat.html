<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Chat With DeepSeek</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Helvetica, Arial, sans-serif;
            background: #f0f0f0;
            height: 100vh;
            overflow: hidden; /* 防止页面整体滚动 */
        }
        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: #202123;
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #4d4d4f;
            flex-shrink: 0;
            height: 100vh;
        }
        .new-chat-btn {
            margin: 10px;
            padding: 12px;
            background: #343541;
            border: 1px solid #565869;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            text-align: left;
        }
        .new-chat-btn:hover {
            background: #40414f;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            height: 100vh;
            overflow: hidden;
        }
        .chat-header {
            padding: 16px;
            font-size: 1.2em;
            font-weight: bold;
            border-bottom: 1px solid #eee;
            background: #ffffff;
            flex-shrink: 0;
        }
        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            min-height: 0; /* 关键：防止撑开父容器 */
        }
        .message {
            margin-bottom: 12px;
            max-width: 70%;
            line-height: 1.4;
            padding: 10px 14px;
            border-radius: 16px;
            position: relative;
        }
        .user {
            align-self: flex-end;
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant {
            align-self: flex-start;
            background: #e5e5ea;
            color: #000;
            border-bottom-left-radius: 4px;
        }
        .typing {
            font-style: italic;
            color: #888;
            margin-bottom: 12px;
        }
        .think-message {
            background: #f5f5f5;
            color: #888;
            font-size: 0.95em;
            font-style: italic;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1px dashed #e0e0e0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            white-space: pre-wrap;
        }
        .input-area {
            display: flex;
            border-top: 1px solid #eee;
            padding: 10px;
            background: #ffffff;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }
        .input-area button {
            margin-left: 8px;
            padding: 0 20px;
            border: none;
            border-radius: 20px;
            background: #007aff;
            color: white;
            cursor: pointer;
        }
        /* 侧边栏历史区滚动 */
        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            min-height: 0;
        }
        .history-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover {
            background: #343541;
        }
        .history-item.active {
            background: #343541;
        }
        textarea#inputMsg::placeholder {
            font-size: 15px;
            color: #aaa;
        }
        textarea#inputMsg::-webkit-scrollbar {
            display: none;
        }
        textarea#inputMsg {
            scrollbar-width: none; /* Firefox */
        }
        /* 添加Markdown样式 */
        .message-content {
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }
        
        .message-content p {
            margin: 0;
            padding: 0;
        }
        
        .message-content p + p {
            margin-top: 0.5em;
        }
        
        .message-content pre {
            margin: 0.5em 0;
            background-color: rgba(0, 0, 0, 0.05);
            border-radius: 6px;
            padding: 16px;
            overflow: auto;
        }
        
        .message-content code {
            background-color: rgba(0, 0, 0, 0.05);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .message-content ul, .message-content ol {
            margin: 0.5em 0;
            padding-left: 2em;
        }
        
        .message-content blockquote {
            margin: 0.5em 0;
            padding-left: 1em;
            border-left: 4px solid rgba(0, 0, 0, 0.1);
            color: rgba(0, 0, 0, 0.7);
        }
        
        .message-content table {
            border-collapse: collapse;
            margin: 0.5em 0;
            width: 100%;
        }
        
        .message-content th, .message-content td {
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 6px 13px;
        }
        
        .message-content th {
            background-color: rgba(0, 0, 0, 0.05);
        }
        
        .message-content img {
            max-width: 100%;
            height: auto;
            margin: 0.5em 0;
        }
        
        .message-content h1, .message-content h2, .message-content h3,
        .message-content h4, .message-content h5, .message-content h6 {
            margin: 0.5em 0;
            font-weight: 600;
            line-height: 1.25;
        }
        
        .message-content h1 { font-size: 1.4em; }
        .message-content h2 { font-size: 1.3em; }
        .message-content h3 { font-size: 1.2em; }
        .message-content h4 { font-size: 1.1em; }
        .message-content h5 { font-size: 1em; }
        .message-content h6 { font-size: 0.9em; }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <button class="new-chat-btn" onclick="startNewChat()">+ 新对话</button>
        <div class="chat-history" id="chatHistory">
            <!-- 历史记录将通过JavaScript动态添加 -->
        </div>
    </div>
    <div class="main-content">
        <div class="wrapper">
            <div class="chat-header">Chat With DeepSeek 🌟</div>
            <div id="chat-window" class="chat-window"></div>
            <div class="input-area" style="flex-direction:column;align-items:stretch;">
                <div style="position:relative;display:flex;flex-direction:column;background:#fff;border-radius:18px;border:1px solid #ccc;padding:10px 12px 38px 12px;box-sizing:border-box;">
                    <textarea id="inputMsg" placeholder="请输入消息..." style="width:100%;min-height:54px;max-height:120px;height:54px;padding:0 0 0 0;border:none;outline:none;font-size:15px;resize:none;overflow-y:auto;box-sizing:border-box;line-height:1.5;background:transparent;" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}" ></textarea>
                    <div style="position:absolute;left:12px;bottom:8px;display:flex;align-items:center;">
                        <label for="fileInput" style="display:flex;align-items:center;cursor:pointer;margin-right:8px;position:relative;">
                            <input type="file" id="fileInput" style="display:none" />
                            <span style="display:inline-block;width:24px;height:24px;background:#f5f5f5;border-radius:50%;border:1px solid #ccc;text-align:center;line-height:24px;font-size:14px;color:#888;" title="上传文档">@</span>
                        </label>
                        <span id="fileNameDisplay" style="font-size:14px;color:#666;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
                    </div>
                    <button onclick="sendMsg()" style="position:absolute;right:12px;bottom:8px;height:32px;padding:0 14px;border:none;border-radius:16px;background:#007aff;color:white;cursor:pointer;display:inline-block;vertical-align:middle;font-size:15px;">发送</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const win = document.getElementById('chat-window');
    const chatHistory = document.getElementById('chatHistory');
    const thinkingStatus = document.getElementById('thinking-status');
    let currentChatId = null;
    let chats = {};
    let chatMemories = {}; // 存储每个对话的chatMemory
    let selectedFile = null;

    // 确保在页面加载完成后加载对话记录
    document.addEventListener('DOMContentLoaded', async function() {
        await loadChatsFromStorage();
        await loadChatMemories(); // 加载chatMemories
    });

    // 从服务器加载对话记录
    async function loadChatsFromStorage() {
        try {
            const response = await axios.get('/chat/api/history');
            console.log('Loaded chats from server:', response.data);
            
            if (response.data && Object.keys(response.data).length > 0) {
                chats = response.data;
                const chatIds = Object.keys(chats);
                if (chatIds.length > 0) {
                    currentChatId = chatIds[chatIds.length - 1];
                    console.log('Switching to chat:', currentChatId);
                    updateChatHistory();
                    await switchChat(currentChatId);
                } else {
                    console.log('No chats found, starting new chat');
                    startNewChat();
                }
            } else {
                console.log('No saved chats found, starting new chat');
                startNewChat();
            }
        } catch (error) {
            console.error('Error loading chats:', error);
            startNewChat();
        }
    }

    // 保存对话记录到服务器
    async function saveChatsToStorage() {
        try {
            const response = await axios.post('/chat/api/history', chats);
            console.log('Saved chats to server:', response.data);
        } catch (error) {
            console.error('Error saving chats:', error);
            alert('保存对话记录失败，请检查网络连接');
        }
    }

    // 从服务器加载chatMemories
    async function loadChatMemories() {
        try {
            const response = await axios.get('/chat/api/memories');
            if (response.data) {
                chatMemories = response.data;
            }
        } catch (error) {
            console.error('Error loading chat memories:', error);
        }
    }

    // 保存chatMemories到服务器
    async function saveChatMemories() {
        try {
            await axios.post('/chat/api/memories', chatMemories);
        } catch (error) {
            console.error('Error saving chat memories:', error);
        }
    }

    async function startNewChat() {
        currentChatId = Date.now().toString();
        chats[currentChatId] = {
            messages: [],
            title: '新对话'
        };
        chatMemories[currentChatId] = []; // 初始化新的chatMemory
        updateChatHistory();
        clearChatWindow();
        await saveChatsToStorage();
        await saveChatMemories();
    }

    function updateChatHistory() {
        chatHistory.innerHTML = '';
        Object.entries(chats).forEach(([id, chat]) => {
            const div = document.createElement('div');
            div.className = 'history-item' + (id === currentChatId ? ' active' : '');
            
            const titleSpan = document.createElement('span');
            titleSpan.textContent = chat.title || '新对话';
            titleSpan.style.flex = '1';
            titleSpan.style.overflow = 'hidden';
            titleSpan.style.textOverflow = 'ellipsis';
            titleSpan.style.whiteSpace = 'nowrap';
            
            const deleteBtn = document.createElement('button');
            deleteBtn.innerHTML = '×';
            deleteBtn.className = 'delete-btn';
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                deleteChat(id);
            };
            
            div.appendChild(titleSpan);
            div.appendChild(deleteBtn);
            div.onclick = () => switchChat(id);
            chatHistory.appendChild(div);
        });
    }

    async function switchChat(chatId) {
        currentChatId = chatId;
        updateChatHistory();
        clearChatWindow();
        
        // 确保chats对象中存在该对话
        if (chats[chatId] && chats[chatId].messages) {
            // 遍历消息并显示，统一用addMsg渲染，保证<think>...</think>分块
            for (const msg of chats[chatId].messages) {
                await addMsg(msg.content, msg.role === 'user' ? 'user' : 'assistant', true);
            }
            win.scrollTop = win.scrollHeight;
        } else {
            console.error('Chat not found or has no messages:', chatId);
        }
    }

    function clearChatWindow() {
        win.innerHTML = '';
    }

    async function addMsg(text, cls, isHistory = false) {
        const div = document.createElement('div');
        div.className = 'message ' + cls;

        // 处理 <think>...</think>，允许消息中既有虚内容也有正式内容
        const thinkRegex = /<think>\s*([\s\S]*?)\s*<\/think>/i;
        const match = text.match(thinkRegex);

        if (match) {
            // 虚内容
            const thinkDiv = document.createElement('div');
            thinkDiv.className = 'think-message';
            thinkDiv.innerText = match[1].trim();
            div.appendChild(thinkDiv);

            // 剩余正式内容
            const rest = text.replace(thinkRegex, '').trim();
            if (rest) {
                const normalDiv = document.createElement('div');
                normalDiv.className = 'message-content';
                normalDiv.innerHTML = marked.parse(rest);
                div.appendChild(normalDiv);
            }
        } else {
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = marked.parse(text);
            div.appendChild(contentDiv);
        }

        win.appendChild(div);
        
        if (!isHistory && currentChatId && !div.hasAttribute('data-loaded')) {
            // 确保chats对象中存在当前对话
            if (!chats[currentChatId]) {
                chats[currentChatId] = {
                    messages: [],
                    title: '新对话'
                };
            }
            
            // 添加新消息
            chats[currentChatId].messages.push({
                role: cls === 'user' ? 'user' : 'assistant',
                content: text
            });
            
            // 如果是第一条用户消息，更新对话标题
            if (cls === 'user' && chats[currentChatId].messages.length === 1) {
                chats[currentChatId].title = text.substring(0, 30) + (text.length > 30 ? '...' : '');
                updateChatHistory();
            }
            
            await saveChatsToStorage();
        }
    }

    // 删除对话
    async function deleteChat(chatId) {
        if (confirm('确定要删除这个对话吗？')) {
            try {
                await axios.delete(`/chat/api/history/${chatId}`);
                delete chats[chatId];
                delete chatMemories[chatId]; // 同时删除对应的chatMemory
                if (chatId === currentChatId) {
                    const chatIds = Object.keys(chats);
                    if (chatIds.length > 0) {
                        currentChatId = chatIds[chatIds.length - 1];
                        await switchChat(currentChatId);
                    } else {
                        await startNewChat();
                    }
                } else {
                    updateChatHistory();
                }
                await saveChatMemories(); // 保存更新后的chatMemories
            } catch (error) {
                console.error('Error deleting chat:', error);
                alert('删除对话失败，请重试');
            }
        }
    }

    let typingIndicator = null;

    function showTyping() {
        typingIndicator = document.createElement('div');
        typingIndicator.className = 'typing';
        typingIndicator.innerHTML = `
            <span>模型正在输入...</span>
            <button onclick="stopTyping()" style="margin-left: 10px; padding: 4px 12px; border: none; border-radius: 4px; background: #ff4d4f; color: white; cursor: pointer; font-size: 13px; transition: all 0.3s;">终止</button>
        `;
        win.appendChild(typingIndicator);
        win.scrollTop = win.scrollHeight;
    }

    function hideTyping() {
        if (typingIndicator) {
            win.removeChild(typingIndicator);
            typingIndicator = null;
        }
    }

    function stopTyping() {
        hideTyping();
        // 发送终止请求到服务器
        axios.post('/chat/api/stop')
            .catch(err => console.error('Error stopping generation:', err));
        
        // 添加终止提示消息
        const stopMsg = document.createElement('div');
        stopMsg.className = 'message assistant';
        stopMsg.innerHTML = '<div style="color: #ff4d4f; font-style: italic;">已终止生成</div>';
        win.appendChild(stopMsg);
        win.scrollTop = win.scrollHeight;
        
        // 确保输入框可用
        const input = document.getElementById('inputMsg');
        input.disabled = false;
        input.focus();
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        selectedFile = e.target.files[0] || null;
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        if (selectedFile) {
            fileNameDisplay.textContent = selectedFile.name;
        } else {
            fileNameDisplay.textContent = '';
        }
    });

    async function sendMsg() {
        const input = document.getElementById('inputMsg');
        const msg = input.value.trim();
        if (!msg && !selectedFile) return;
        if (!currentChatId) {
            await startNewChat();
        }
        await addMsg(msg, 'user');
        input.value = '';
        input.disabled = true;
        showTyping();
        try {
            let res;
            if (selectedFile) {
                // 构造FormData，包含消息、历史、chatId和文件
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('message', msg);
                formData.append('messages', JSON.stringify(chats[currentChatId].messages));
                res = await axios.post('/chat/message-with-file', formData, {
                    headers: { 'Content-Type': 'multipart/form-data' }
                });
                selectedFile = null;
                document.getElementById('fileInput').value = '';
                document.getElementById('fileNameDisplay').textContent = '';
            } else {
                res = await axios.post('/chat/api/message', {
                    messages: chats[currentChatId].messages,
                    chatMemory: chatMemories[currentChatId] || [],
                    chatId: currentChatId
                });
            }
            hideTyping();
            await addMsg(res.data.response || res.data.reply, 'assistant');
            if (res.data.chatMemory) {
                chatMemories[currentChatId] = res.data.chatMemory;
                await saveChatMemories();
            }
        } catch (err) {
            hideTyping();
            await addMsg('出错了，请重试。', 'assistant');
        } finally {
            input.disabled = false;
            input.focus();
        }
    }

    // 添加删除按钮的样式
    const style = document.createElement('style');
    style.textContent = `
        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 18px;
            padding: 0 5px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .history-item:hover .delete-btn {
            opacity: 1;
        }
        .delete-btn:hover {
            color: #ff4444;
        }
    `;
    document.head.appendChild(style);
</script>
</body>
</html>
